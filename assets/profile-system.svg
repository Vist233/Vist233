<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 360" role="img" aria-labelledby="title desc">
  <title id="title">Product and technology in the AI era</title>
  <desc id="desc">A minimal monochrome GitHub profile banner with one signal-lime accent.</desc>
  <defs>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#f2f2ef" stroke-opacity=".07" stroke-width="1"/>
    </pattern>
    <linearGradient id="paper" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#050505"/>
      <stop offset=".62" stop-color="#10100f"/>
      <stop offset="1" stop-color="#050505"/>
    </linearGradient>
  </defs>

  <rect width="1440" height="360" fill="url(#paper)"/>
  <rect width="1440" height="360" fill="url(#grid)"/>

  <g stroke="#f2f2ef" stroke-opacity=".24" stroke-width="1">
    <path d="M72 66H1368"/>
    <path d="M72 294H1368"/>
    <path d="M72 66V294"/>
    <path d="M1368 66V294"/>
    <path d="M72 204H1368"/>
  </g>

  <g transform="translate(96 90)">
    <rect x="0" y="0" width="12" height="12" fill="#d8ff3e"/>
    <text x="30" y="12" fill="#a7a7a1" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" letter-spacing="2">VIST233 / AI ERA</text>
  </g>

  <g transform="translate(96 136)">
    <text fill="#f2f2ef" font-family="Inter, Helvetica, Arial, sans-serif" font-weight="650" font-size="92" letter-spacing="0">
      <tspan x="0" y="78">PRODUCT</tspan>
      <tspan x="470" y="78" fill="#d8ff3e">×</tspan>
      <tspan x="540" y="78" fill="none" stroke="#f2f2ef" stroke-width="1.4">TECHNOLOGY</tspan>
    </text>
  </g>

  <g transform="translate(96 248)">
    <path d="M0 0H600" stroke="#f2f2ef" stroke-opacity=".28"/>
    <text x="0" y="34" fill="#d7e3e8" font-family="Inter, Helvetica, Arial, sans-serif" font-size="24" font-weight="360">Balance, evidence, and useful systems.</text>
  </g>

  <g transform="translate(1110 242)" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" fill="#a7a7a1">
    <text x="0" y="0">01 PRODUCT JUDGMENT</text>
    <text x="0" y="28">02 TECHNICAL SYSTEMS</text>
    <rect x="198" y="-10" width="12" height="12" fill="#d8ff3e"/>
  </g>
</svg>
